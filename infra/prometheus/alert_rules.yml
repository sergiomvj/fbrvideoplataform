groups:
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Target {{ $labels.job }} at {{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / (1024 * 1024) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: "{{ $labels.job }} is using {{ $value | printf \"%.0f\" }}MB of resident memory."

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.job }}"
          description: "{{ $labels.job }} CPU usage is {{ $value | printf \"%.2f\" }} cores (5m average)."

      - alert: BackendHealthFailing
        expr: probe_success{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend health check failing"
          description: "Backend at {{ $labels.instance }} health checks have been failing for 2 minutes."
